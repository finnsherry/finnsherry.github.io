<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curiosa: Connected Components</title>
    <link rel="icon" href="/content/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
    <style>
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
    <script type="module" src='main.js' defer></script>
    <link rel="stylesheet" href="/utils/katex/katex.min.css">
    <script defer src="/utils/katex/katex.min.js"></script>
    <script defer src="/utils/katex/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
</head>

<body>
    <header>
        <div id="nav">
            <a class="navlink" href="/">Home</a>
            <a class="navlink" href="/publications">Publications</a>
            <!-- <a class="navlink" href="/teaching">Teaching</a> -->
            <a class="navlink" href="/curiosa">Curiosa</a>
        </div>
        <a id="home" href="/">Finn Sherry</a>
        <button id="colourbutton">
            🌙
        </button>
        <button id="navbutton" onclick="toggleNav()">
            •••
        </button>
        <script>
            function toggleNav() {
                document.getElementById("nav").classList.toggle('expand')
            }

            const root = document.documentElement;
            const storedScheme = localStorage.getItem('scheme');
            console.log(storedScheme)
            const colourButton = document.getElementById("colourbutton");
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const scheme = storedScheme || (prefersDark ? 'dark' : 'light');

            applyScheme(scheme);

            colourButton.addEventListener("click", () => {
                const current = root.dataset.scheme === 'dark' ? 'dark' : 'light';
                const next = current === 'dark' ? 'light' : 'dark';
                applyScheme(next);
                localStorage.setItem('scheme', next);
            });

            function applyScheme(scheme) {
                root.dataset.scheme = scheme
                colourButton.textContent = scheme === "dark" ? "☀️" : "🌙";
            }
        </script>
    </header>

    <main>
        <div class="content-container">
            <h1>Connected Components</h1>

            <table class="form" id="parameters">
                <tr>
                    <td><label for="delta">\(\delta\): </label></td>
                    <td><input type="text" id="delta" name="delta" required></td>
                </tr>
                <tr>
                    <td><label for="threshold">Threshold: </label></td>
                    <td><input type="text" id="threshold" name="showEvery" required></td>
                </tr>
            </table>
            <table class="form" id="buttons">
                <tr>
                    <td><button id="binarise">Binarise</button></td>
                    <td><button id="dilate">Dilate</button></td>
                    <td><button id="connect">Connect</button></td>
                </tr>
            </table>

            <canvas id="canvas" style="width: 100%;"></canvas>
        </div>
    </main>
</body>

</html>
